app = 'rsl-services-logistics'
primary_region = 'ord'

[build]
# Dockerfile handles the build

[env]
PORT = '3000'
HOST = '0.0.0.0'
NODE_ENV = "production"
SHOPIFY_APP_URL = "https://rsl-services-logistics.fly.dev"
SHOPIFY_AUTH_CALLBACK_PATH = "/auth/callback"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
